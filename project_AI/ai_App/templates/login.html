{% extends 'base.html' %}
{% block title %}Login - SmartCare AI{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="kims-card">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-lock text-primary fs-1 mb-3"></i>
                    <h3 class="fw-bold" style="color: var(--kims-blue);">Secure Portal Access</h3>
                    <p class="text-muted">Enter your credentials to continue</p>
                </div>

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username / User ID</label>
                        <input type="text" class="form-control form-control-lg" name="username" placeholder="e.g. jdoe123" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-lg" name="password" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-kims-primary w-100 btn-lg mb-3">Sign In</button>
                    
                    <div class="text-center text-muted">
                        Don't have an account? <a href="{% url 'register' %}" style="color: var(--kims-blue); font-weight: 600;">Register Now</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
